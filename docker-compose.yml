services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    volumes:
      - ./data:/app/data
    environment:
      - BOT_PORT=3001
      - PYTHON_API_URL=http://backend:8000
    env_file:
      - .env
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - BOT_API_URL=http://bot:3001
      - PYTHON_API_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - bot
    restart: unless-stopped

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Tool – Memory Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/dark.css" />
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">

  <!-- Nav -->
  <nav class="bg-white sticky top-0 z-30 shadow-sm border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/static/index.html" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-xl bg-blue-600 flex items-center justify-center shadow-sm group-hover:bg-blue-700 transition-colors">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <span class="text-base font-bold text-gray-900">Parent Tool</span>
      </a>
      <div class="flex gap-1 flex-wrap">
        <a href="/static/index.html" class="px-4 py-2 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors">Dashboard</a>
        <a href="/static/enrollment.html" class="px-4 py-2 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors">Enrollment</a>
        <a href="/static/settings.html" class="px-4 py-2 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors">Settings</a>
        <a href="/static/memory_book.html" class="px-4 py-2 rounded-xl text-sm font-medium text-pink-600 bg-pink-50">Memory Book</a>
        <a href="/static/wrapped.html" class="px-4 py-2 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors">Wrapped</a>
      </div>
      <button id="dark-toggle" onclick="toggleDark()" class="p-2 rounded-xl text-gray-400 hover:bg-gray-100 transition-colors" title="Toggle dark mode">
        <svg id="dark-icon-moon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg id="dark-icon-sun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Memory Book</h1>
        <p class="text-sm text-gray-400 mt-1">Every time your kids were spotted</p>
      </div>
      <div class="flex gap-2 items-center">
        <select id="year-filter" onchange="loadBook()" class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-500 bg-white">
          <option value="">All years</option>
        </select>
      </div>
    </div>

    <div id="loading" class="text-center py-20 text-gray-400">Loading your memories...</div>

    <div id="empty" class="hidden text-center py-20">
      <div class="w-16 h-16 rounded-2xl bg-pink-50 flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-pink-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </div>
      <p class="text-gray-500 font-medium">No matched photos yet</p>
      <p class="text-gray-400 text-sm mt-1">Matches will appear here automatically as your kids are spotted.</p>
    </div>

    <div id="timeline" class="space-y-10"></div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4" onclick="closeLightbox()">
    <img id="lightbox-img" class="max-w-full max-h-full rounded-xl shadow-2xl" />
  </div>

  <script>
    async function loadBook() {
      const year = document.getElementById('year-filter').value;
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('timeline').innerHTML = '';

      try {
        const url = `/api/dashboard/memory-book${year ? '?year=' + year : ''}`;
        const r = await fetch(url);
        const d = await r.json();

        document.getElementById('loading').classList.add('hidden');

        if (!d.months || !d.months.length) {
          document.getElementById('empty').classList.remove('hidden');
          return;
        }

        const tl = document.getElementById('timeline');
        for (const month of d.months) {
          const section = document.createElement('div');
          section.innerHTML = `
            <div class="flex items-center gap-3 mb-4">
              <h2 class="text-lg font-bold text-gray-900">${month.label}</h2>
              <span class="px-2.5 py-0.5 bg-pink-100 text-pink-700 text-xs font-semibold rounded-full">${month.entries.length} match${month.entries.length !== 1 ? 'es' : ''}</span>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
              ${month.entries.map(e => buildCard(e)).join('')}
            </div>`;
          tl.appendChild(section);
        }
      } catch (_) {
        document.getElementById('loading').textContent = 'Failed to load.';
      }
    }

    function buildCard(e) {
      const date = new Date(e.timestamp);
      const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      const confPct = Math.round((e.confidence || 0) * 100);
      const kids = (e.kid_names || '').split(',').map(k => k.trim()).filter(Boolean);
      const kidBadges = kids.map(k =>
        `<span class="px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-xs font-medium">${k}</span>`
      ).join(' ');

      if (e.has_photo) {
        return `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden cursor-pointer hover:shadow-md transition-shadow"
               onclick="openLightbox(${e.id})">
            <div class="aspect-square bg-gray-100 overflow-hidden">
              <img src="/api/dashboard/memory-book/photo/${e.id}" alt=""
                   class="w-full h-full object-cover" loading="lazy"
                   onerror="this.parentElement.innerHTML='${photoPlaceholderSvg()}'" />
            </div>
            <div class="p-3">
              <div class="flex flex-wrap gap-1 mb-1.5">${kidBadges}</div>
              <p class="text-xs text-gray-500 truncate">${e.group_name || ''}</p>
              <div class="flex items-center justify-between mt-2">
                <span class="text-xs text-gray-400">${dateStr} ${timeStr}</span>
                <span class="text-xs font-medium ${confPct >= 70 ? 'text-green-600' : 'text-amber-600'}">${confPct}%</span>
              </div>
            </div>
          </div>`;
      } else {
        return `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="aspect-square bg-gray-50 flex flex-col items-center justify-center">
              <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <p class="text-xs text-gray-300">Photo not saved</p>
            </div>
            <div class="p-3">
              <div class="flex flex-wrap gap-1 mb-1.5">${kidBadges}</div>
              <p class="text-xs text-gray-500 truncate">${e.group_name || ''}</p>
              <div class="flex items-center justify-between mt-2">
                <span class="text-xs text-gray-400">${dateStr} ${timeStr}</span>
                <span class="text-xs font-medium ${confPct >= 70 ? 'text-green-600' : 'text-amber-600'}">${confPct}%</span>
              </div>
            </div>
          </div>`;
      }
    }

    function photoPlaceholderSvg() {
      return `<div class='w-full h-full flex items-center justify-center bg-gray-100'><svg class='w-8 h-8 text-gray-300' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z'/></svg></div>`;
    }

    function openLightbox(id) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = `/api/dashboard/memory-book/photo/${id}`;
      lb.classList.remove('hidden');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
      document.getElementById('lightbox-img').src = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // Populate year filter with last 5 years
    async function initYears() {
      const sel = document.getElementById('year-filter');
      const thisYear = new Date().getFullYear();
      for (let y = thisYear; y >= thisYear - 4; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        sel.appendChild(opt);
      }
    }

    initYears().then(() => loadBook());
  </script>
  <script src="/static/dark.js"></script>
  <script src="/static/pin_lock.js"></script>
</body>
</html>
